<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([49.7475, 13.3776], 13); // Plzeň střed

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    // Příklad stanic
    const stations = [
      { name: "Hlavní nádraží", coords: [49.7467, 13.3776] },
      { name: "Bolevec", coords: [49.7540, 13.3600] },
      // další posíláš ty
    ];

    stations.forEach(station => {
      const marker = L.marker(station.coords).addTo(map);
      marker.bindPopup(`<b>${station.name}</b><br>Klikni pro zabraní!`);
      marker.on('click', () => {
        alert(`Chceš zabrat stanici: ${station.name}`);
      });
    });
  </script>
</body>
</html>
