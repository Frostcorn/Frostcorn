async function updatePlayerSelect() {
  try {
    const { data, error } = await supabase
      .from('station_logs')
      .select('player');
    if (error) throw error;

    const uniquePlayers = [...new Set(data.map(d => d.player))];
    const playerSelect = document.getElementById('playerSelect');
    playerSelect.innerHTML = ''; // vyčistit staré možnosti

    playerSelect.innerHTML = uniquePlayers
      .map(player => `<option value="${player}">${player}</option>`)
      .join('');
  } catch (err) {
    console.error("Chyba při fetchi hráčů:", err);
  }
}

async function getOfficialTime() {
  try {
    // fetch serverového času z Supabase
    const { data, error } = await supabase
      .from('station_logs')       // vybereme libovolnou tabulku
      .select('time')
      .limit(1)                   // jen dummy row pro fetch
      .order('time', { ascending: false });

    if (error) throw error;

    // pokud máme nějaký záznam, vezmeme aktuální serverový čas UTC
    const utcNow = new Date(); // fallback
    if (data && data.length > 0 && data[0].time) {
      utcNow.setTime(Date.now()); // jen placeholder, protože Supabase vrátí vlastně UTC server
    }

    // převedeme na Prague time
    const tzOffset = 1; // CET standardní offset
    const dst = new Date().getTimezoneOffset() < new Date(Date.UTC(2026,0,1)).getTimezoneOffset() ? 1 : 0;
    const pragueTime = new Date(utcNow.getTime() + ((tzOffset + dst) * 60 * 60 * 1000));

    return pragueTime;
  } catch (err) {
    console.error("Chyba při fetchi oficiálního času:", err);
    return new Date(); // fallback na lokální čas
  }
}

// JS logika
function showReportModal() {
  const modal = document.getElementById("quarterHourModal");
  const modalText = document.getElementById("modalText");
  const closeBtn = document.getElementById("closeModal");
  const bar = document.getElementById("modalBar");

  if (!modal || !modalText || !closeBtn || !bar) {
    console.error("Modal elementy nenalezeny!");
    return;
  }

  modalText.textContent =
    "Nahlaš svoji pozici na Whatsapp (stanici a spoj nebo „na zastávce“).";

  modal.style.display = "block";
  closeBtn.disabled = true;
  bar.style.width = "0%";

  const duration = 3000;
  const start = performance.now();

  function animate(now) {
    const progress = Math.min((now - start) / duration, 1);
    bar.style.width = `${progress * 100}%`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      closeBtn.disabled = false;
    }
  }

  requestAnimationFrame(animate);

  closeBtn.onclick = () => {
    modal.style.display = "none";
  };
}

// funkce pro spuštění modalu každých 15 minut
async function scheduleQuarterHourModal() {
  const now = await getOfficialTime();
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  
  // zjistí, kolik ms do další čtvrthodiny
  const nextQuarter = (15 - (minutes % 15)) * 60 * 1000 - seconds * 1000;
  
  setTimeout(() => {
    showReportModal(); // popup první čtvrthodina
    setInterval(() => showReportModal(), 15*60*1000); // každých 15 minut
  }, nextQuarter);
}

// spustit na začátku
document.addEventListener('DOMContentLoaded', () => {
  scheduleQuarterHourModal();
});

function updateStationLogUI(stationName, log = []) {
  const logDiv = document.getElementById(`log-${stationName.replace(/\s+/g,'_')}`);
  if (!logDiv) return;
  const ul = logDiv.querySelector("ul");
  ul.innerHTML = '';
  log.forEach(entry => {
    const li = document.createElement("li");
    li.textContent = `${entry.player} - ${entry.time}`;
    ul.appendChild(li);
  });
}

function startCapture(station) {
  const player = currentPlayer;
  const name = station.name;

  if (activeCapture) {
    alert(`Už máš jednu stanici zabíranou: ${activeCapture.stationName}`);
    return;
  }

  const fetchedLog = station.fetchedLog ?? []; // logy ze Supabase
  const uniquePlayers = new Set(fetchedLog.map(entry => entry.player));
  const minutes = 1 + uniquePlayers.size * 3;
  const endTime = Date.now() + minutes * 60_000 + 1;

  // ... zbytek kódu beze změny

  // interval pro timer
  const interval = setInterval(() => {
    const left = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    const box = document.getElementById("timerBox");
    box.style.display = "block";
    box.innerHTML = `
      <b>${name}</b><br>
      Zbývá: ${Math.floor(left / 60)}:${String(left % 60).padStart(2,"0")}
      <br>
      <button onclick="cancelCapture('${name}')">Zrušit</button>
    `;
    if (left <= 0) clearInterval(interval);
  }, 1000);

  // timeout pro finalize
  const timerId = setTimeout(() => finalizeCapture(name, player), minutes * 60_000);

  activeCaptures[name] = { timerId, interval, endTime };
  activeCapture = { stationName: name }; // blokuje další zabírání
}

function cancelCapture(stationName) {
  if (!activeCaptures[stationName]) return;

  clearTimeout(activeCaptures[stationName].timerId);
  clearInterval(activeCaptures[stationName].interval);
  delete activeCaptures[stationName];
  activeCapture = null;

  hideTimer();
}

async function finalizeCapture(stationName, player) {
  const station = stations.find(s => s.name === stationName);
  if (!station) return;

  // inicializace fetchedLog pokud náhodou není
  if (!station.fetchedLog) station.fetchedLog = [];

  // přidáme nový záznam do lokální kopie
const now = await getOfficialTime();
const newEntry = {
  player,
  time: now.toTimeString().split(' ')[0] // "HH:MM:SS"
};
  station.fetchedLog.push(newEntry);

  // aktualizace GUI podle všech záznamů (včetně fetchedLog ze Supabase)
  updateStationLogUI(stationName, station.fetchedLog);

  // zrušení timerů
  if (activeCaptures[stationName]) {
    clearInterval(activeCaptures[stationName].interval);
    clearTimeout(activeCaptures[stationName].timerId);
    delete activeCaptures[stationName];
  }
  activeCapture = null;
  hideTimer();

  alert(`Stanice ${stationName} byla zabráná!`);

  // přidání záznamu do Supabase
  try {
    const { error } = await supabase
      .from('station_logs')
      .insert([{ station_id: station.id, player, time: newEntry.time }]);

    if (error) throw error;
    console.log(`Záznam hráče ${player} přidán do Supabase pro stanici ${stationName}`);
	updateStealTable();
  } catch (err) {
    console.error("Chyba při zápisu do Supabase:", err);
  }
}

function showTimer(stationName, endTime) {
  const box = document.getElementById("timerBox");
  box.style.display = "block";

  const update = () => {
    let left = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    if (left === 0) {
      clearInterval(interval);
    }
    box.innerHTML = `
      <b>${stationName}</b><br>
      Zbývá: ${Math.floor(left / 60)}:${String(left % 60).padStart(2,"0")}
      <br>
      <button onclick="cancelCapture('${stationName}')">Zrušit</button>
    `;
  };

  update(); // zobrazíme hned, nečekáme na interval
  const interval = setInterval(update, 1000);
}

function hideTimer() {
  document.getElementById("timerBox").style.display = "none";

	  station.id = stationId;
	  const markerColor = station.color || "black";
	  const marker = L.marker(
		station.coords,
		{ icon: createColoredMarker(markerColor) }
	  ).addTo(map);

	marker.on("click", async () => {
  const logId = `log-${station.name.replace(/\s+/g,'_')}`;

  let data = [];
  try {
    const { data: fetchedData, error } = await supabase
      .from('station_logs')
      .select('*')
      .eq('station_id', stationId)
      .order('time', { ascending: true });

    if (error) throw error;
    data = fetchedData;
    station.fetchedLog = data;
  } catch (err) {
    console.error("Chyba při fetchi logů:", err);
  }

  const ulContent = data.map(entry => `<li>${entry.player} - ${entry.time}</li>`).join('');

  infoDiv.innerHTML = `

`;
const closeBtn = document.getElementById("closeInfo");
  if (closeBtn) {

infoDiv.style.display = "block";

	const playerStealSelect = document.getElementById("playerStealSelect");
	const stealTableBody = document.querySelector("#stealTable tbody");
	const selectedStationDiv = document.getElementById("selectedStation");
	const submitStealBtn = document.getElementById("submitStealBtn");

	let currentSelection = null; // { stationId, player, logTime }

	async function initStealBox() {
  try {
    const { data, error } = await supabase
      .from('station_logs')
      .select('player');
    if (error) throw error;

    // deduplikace hráčů jednoduše přes Set
    const uniquePlayers = [...new Set(data.map(d => d.player))];

    // naplníme stealablePlayers select přesně jako playerSelect
    playerStealSelect.innerHTML = uniquePlayers
      .map(player => `<option value="${player}">${player}</option>`)
      .join('');
  } catch (err) {
    console.error("Chyba při fetchi hráčů:", err);
  }

  updateStealTable();
}

	playerStealSelect.addEventListener("change", updateStealTable);

	async function updateStealTable() {
  const selectedStealPlayer = playerStealSelect.value;
  if (!selectedStealPlayer) {
    stealTableBody.innerHTML = "";
    return;
  }

  try {
    const { data: allLogs, error } = await supabase
      .from('station_logs')
      .select('*');
    if (error) throw error;

    const lastLogByStation = {};
    allLogs.forEach(l => {
      if (!lastLogByStation[l.station_id] || l.id > lastLogByStation[l.station_id].id) {
        lastLogByStation[l.station_id] = l;
      }
    });

    const playerStationIds = new Set(
      allLogs.filter(l => l.player === selectedStealPlayer).map(l => l.station_id)
    );

    const rows = Array.from(playerStationIds).map(stationId => {
  const station = stations.find(s => s.id === stationId);
  if (!station) return null;

  const lastLog = lastLogByStation[stationId];
  const canSteal = lastLog.player === selectedStealPlayer && lastLog.player !== currentPlayer;
  return {
    station_id: station.id,
    name: station.name,
    points: station.points,
    time: lastLog.time,
    canSteal
  };
}).filter(Boolean);

// vykreslení tabulky
stealTableBody.innerHTML = rows.map(r => `
  <tr>
    <td>
      <input type="radio" name="stationSelect" value="${r.station_id}" ${r.canSteal ? "" : "disabled"}>
    </td>
    <td>${r.name}</td>
    <td>${r.points}</td>
    <td>${r.time}</td>
  </tr>
`).join('');

    stealTableBody.querySelectorAll('input[name="stationSelect"]').forEach(input => {
      input.addEventListener('change', (e) => {
        const row = rows.find(r => r.station_id == e.target.value);
        currentSelection = row;
        selectedStationDiv.textContent = row ? row.name : "";
        submitStealBtn.disabled = !row;
      });
    });

  } catch (err) {
    console.error("Chyba při update tabulky steal:", err);
  }
}

	submitStealBtn.addEventListener('click', async () => {
	  if (!currentSelection) return;

	  const stealingPlayer = currentPlayer; // hráč, kdo stealuje
	  const stationId = currentSelection.station_id;

	  try {
		const now = await getOfficialTime();
		const timeOnly = now.toTimeString().split(' ')[0]; // "17:17:40"
		const { error } = await supabase
			.from('station_logs')
			.insert([{ station_id: stationId, player: stealingPlayer, time: timeOnly }]);
		
		if (error) throw error;

		console.log(`Steal log inserted: stanice ${stationId}, hráč ${stealingPlayer}, čas ${now.toISOString()}`);
		alert(`Stanice ${currentSelection.name} byla stealnuta pro ${stealingPlayer}!`);

		// refresh tabulky
		updateStealTable();
		selectedStationDiv.textContent = "";
		currentSelection = null;
		submitStealBtn.disabled = true;

	  } catch (err) {
		console.error("Chyba při steal:", err);
	  }
	});

	// inicializace
	initStealBox();

	</script>
